<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pokémon Card Kidnapping - 3D Case File</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .interactive { pointer-events: auto; }
        
        .hud-top {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #1e293b;
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 650px;
            margin: 0 auto;
            backdrop-filter: blur(6px);
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #ef4444; margin: 0 0 5px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .credits { color: #94a3b8; font-size: 12px; margin: 0 0 8px 0; font-style: italic; }
        .controls-hint { color: #38bdf8; font-size: 13px; font-weight: bold; margin: 0; }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }

        #interaction-prompt {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
            display: none;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
            z-index: 15;
        }

        .dialogue-box {
            background: rgba(9, 9, 11, 0.98);
            border: 2px solid #3b82f6;
            padding: 25px;
            border-radius: 8px;
            max-width: 700px;
            width: 90%;
            margin: 0 auto 20px auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none;
        }
        .dialogue-box p { font-size: 15px; line-height: 1.6; margin: 0 0 18px 0; color: #e4e4e7; }
        
        .btn-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            background: #1f2937;
            color: #fff;
            border: 1px solid #4b5563;
            padding: 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-danger { background: #7f1d1d; border-color: #b91c1c; grid-column: span 2; }
        .btn-danger:hover { background: #dc2626; border-color: #dc2626; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>

    <div id="ui-overlay">
        <div class="hud-top interactive">
            <h1>The Pokémon Card Kidnapping</h1>
            <div class="credits">Case File Compiled by: Graham, Jayden, Rodrigo, Arav</div>
            <p class="controls-hint">⌨️ WALK: W, A, S, D | 🖱️ LOOK AROUND: CLICK & DRAG MOUSE</p>
        </div>

        <div id="interaction-prompt">PRESS [ E ] TO INVESTIGATE</div>

        <div class="dialogue-box interactive" id="dialogue-window">
            <div id="dialogue-content"></div>
        </div>
    </div>

<script>
    // --- SCENE SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x070a13);
    scene.fog = new THREE.FogExp2(0x070a13, 0.02);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.2, 28); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // --- ENVIRONMENT LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const addStreetLight = (x, z, color, intensity) => {
        const light = new THREE.PointLight(color, intensity, 30);
        light.position.set(x, 8, z);
        scene.add(light);
        
        // Light post visual mesh
        const postGeo = new THREE.CylinderGeometry(0.1, 0.1, 8);
        const postMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
        const post = new THREE.Mesh(postGeo, postMat);
        post.position.set(x, 4, z);
        scene.add(post);

        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshBasicMaterial({ color: color }));
        bulb.position.set(x, 8, z);
        scene.add(bulb);
    };
    addStreetLight(-18, -5, 0x3b82f6, 1.2); // Store entrance light
    addStreetLight(18, -5, 0x22c55e, 1.2);  // Gas station light
    addStreetLight(0, 15, 0xeab308, 1.0);   // Street corner light

    // --- WORLD ENVIRONMENT MAP ARCHITECTURE ---
    // Ground Flooring
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.4 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Structural Pillars / Wall Blocks
    const createStructure = (w, h, d, x, z, color, label) => {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h/2, z);
        scene.add(mesh);
    };
    // Pokémon Store Building Shell
    createStructure(20, 10, 12, -22, -15, 0x1e3a8a);
    // Gas Station Shell
    createStructure(20, 10, 12, 22, -15, 0x064e3b);
    // Bus Stop structure where kidnap happened
    createStructure(6, 4, 3, -2, 12, 0x475569);

    // Rodrigo's Lemonade Stand Asset
    createStructure(3, 1.5, 2, -12, 8, 0xeab308);

    // --- CHARACTER CREATOR (ACTUAL PEOPLE WITH LIMBS AND DETAILS) ---
    const npcs = [];
    let activeNpc = null;

    function buildPersonMesh(shirtColor, pantsColor, skinColor, hairColor) {
        const personGroup = new THREE.Group();

        // Torso / Shirt
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.1, 0.4), new THREE.MeshStandardMaterial({ color: shirtColor }));
        torso.position.y = 1.35;
        personGroup.add(torso);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshStandardMaterial({ color: skinColor }));
        head.position.y = 2.15;
        personGroup.add(head);

        // Hair / Hat
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.15, 0.34), new THREE.MeshStandardMaterial({ color: hairColor }));
        hair.position.set(0, 2.35, 0.02);
        personGroup.add(hair);

        // Left Leg
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.8), new THREE.MeshStandardMaterial({ color: pantsColor }));
        leftLeg.position.set(-0.22, 0.4, 0);
        personGroup.add(leftLeg);

        // Right Leg
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.8), new THREE.MeshStandardMaterial({ color: pantsColor }));
        rightLeg.position.set(0.22, 0.4, 0);
        personGroup.add(rightLeg);

        // Left Arm
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.8), new THREE.MeshStandardMaterial({ color: shirtColor }));
        leftArm.position.set(-0.52, 1.2, 0);
        personGroup.add(leftArm);

        // Right Arm
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.11, 0.8), new THREE.MeshStandardMaterial({ color: shirtColor }));
        rightArm.position.set(0.52, 1.2, 0);
        personGroup.add(rightArm);

        return personGroup;
    }

    function spawnNpc(x, z, shirtColor, pantsColor, skinColor, hairColor, name, labelText) {
        const model = buildPersonMesh(shirtColor, pantsColor, skinColor, hairColor);
        model.position.set(x, 0, z);
        model.userData = { name: name, label: labelText };
        scene.add(model);
        npcs.push(model);

        // Floating beacon ring marker under feet
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.8, 1.0, 16), new THREE.MeshBasicMaterial({ color: shirtColor, side: THREE.DoubleSide }));
        ring.rotation.x = Math.PI / 2;
        ring.position.set(x, 0.03, z);
        scene.add(ring);
    }

    // Spawn suspects precisely tracking the project document parameters
    spawnNpc(15, -4, 0xdc2626, 0x1f2937, 0xffdbac, 0x451a03, "alexander", "Alexander Foed Hungary"); 
    spawnNpc(-15, -4, 0x2563eb, 0x374151, 0xe0a96d, 0x171717, "shopkeeper", "The Pokémon Store Clerk");
    spawnNpc(-12, 10, 0xf59e0b, 0x0284c7, 0xc58c85, 0x262626, "rodrigo", "Rodrigo Martini");
    spawnNpc(2, 14, 0x4b5563, 0x111827, 0x8d5524, 0x737373, "homeless", "The Homeless Man");

    // The Disguised Construction Van
    const vanGroup = new THREE.Group();
    const vanBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 3.2, 8), new THREE.MeshStandardMaterial({ color: 0xf3f4f6 }));
    vanBody.position.y = 1.9;
    vanGroup.add(vanBody);
    
    // Magnetic Sign board on side (The Fake Construction Label)
    const signGeo = new THREE.BoxGeometry(0.1, 1.2, 3.5);
    const signMat = new THREE.MeshStandardMaterial({ color: 0xeab308 });
    const signLeft = new THREE.Mesh(signGeo, signMat); signLeft.position.set(-2.26, 1.9, 0); vanGroup.add(signLeft);
    const signRight = new THREE.Mesh(signGeo, signMat); signRight.position.set(2.26, 1.9, 0); vanGroup.add(signRight);

    const wheelGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.9, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x0f172a });
    const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.rotation.z = Math.PI/2; w1.position.set(2.2, 0.65, 2.2); vanGroup.add(w1);
    const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.rotation.z = Math.PI/2; w2.position.set(-2.2, 0.65, 2.2); vanGroup.add(w2);
    const w3 = new THREE.Mesh(wheelGeo, wheelMat); w3.rotation.z = Math.PI/2; w3.position.set(2.2, 0.65, -2.2); vanGroup.add(w3);
    const w4 = new THREE.Mesh(wheelGeo, wheelMat); w4.rotation.z = Math.PI/2; w4.position.set(-2.2, 0.65, -2.2); vanGroup.add(w4);
    
    vanGroup.position.set(-8, 0, -18);
    vanGroup.userData = { name: "van", label: "Unmarked White Van (Disguised)" };
    scene.add(vanGroup);
    npcs.push(vanGroup);

    // --- GAME CASE DIALOGUES ENGINE ---
    const caseFiles = {
        intro: {
            text: "<strong>CASE BRIEFING:</strong> On 23/06/2026 at 17:38, 11-year-old Gregory Mottingham was kidnapped right outside the United Kingdom Pokémon store after buying a booster pack for $300. An individual matching a suspect profile locked him inside an unmarked white van wearing a construction disguise overlay.<br><br><strong>CONTROLS:</strong> Walk around using <strong>W,A,S,D</strong>. Hold down your mouse and drag to turn your head. Interrogate suspects by standing close and pressing <strong>[ E ]</strong>.",
            choices: [{ text: "Begin Investigation Log", action: "close" }]
        },
        alexander: {
            text: "<strong>SUSPECT DOSSIER: ALEXANDER FOED HUNGARY</strong><br><br>• <em>Motive Tracking:</em> He desperately wanted the rare card assets. At exactly 17:38, he saw Gregory and decided he NEEDED that card to beat his best friend in a Pokémon showdown, wanting to be the only person in the city to own it.<br>• <em>Alibi Claim:</em> 'I was inside the local nearby gas station restroom toilet stalls during those exact window minutes. I never went outside!'<br>• <em>The Loophole:</em> Gas station CCTV monitors track him entering the bathroom corridor pathway before 17:38... <strong>but he never returns past the layout cameras</strong>. The rear emergency bathroom window was left completely unbolted!",
            choices: [{ text: "Break Off Questioning", action: "close" }, { text: "⚖️ FORMALLY ARREST ALEXANDER", action: "accuse_alex" }]
        },
        shopkeeper: {
            text: "<strong>SUSPECT DOSSIER: THE POKÉMON SHOPKEEPER</strong><br><br>• <em>Motive Tracking:</em> Rumored to be running a localized scam where he swapped high-value cards for fake stock variants to maximize profit margins.<br>• <em>Alibi Claim:</em> Stated he remained stuck behind the transaction register terminal desk engaged in a frantic customer phone call with his companion.<br>• <em>Verification:</em> Digital network logs fully back up his data window timeline frames. He is cleared of actions.",
            choices: [{ text: "Break Off Questioning", action: "close" }]
        },
        rodrigo: {
            text: "<strong>SUSPECT DOSSIER: RODRIGO MARTINI</strong><br><br>• <em>Motive Tracking:</em> Was running a lemonade stand nearby to pool together funding scripts for Robux virtual cards. He stepped inside the store looking to trade for gift cards, but they didn't stock them, so he walked out at the same time as Gregory.<br>• <em>Verification:</em> Core public sector street CCTV outlines him exiting and immediately heading away from the transport vector vectors with empty hands.",
            choices: [{ text: "Break Off Questioning", action: "close" }]
        },
        homeless: {
            text: "<strong>SUSPECT DOSSIER: THE HOMELESS MAN</strong><br><br>• <em>Motive Tracking:</em> Highly observant of physical asset changes on the concrete layout line. If he secured a card worth $300, he could sell it to get back on his feet.<br>• <em>Alibi Claim:</em> Pointed out he watched from his concrete grid junction. Perimeter camera frames prove he remained completely stationary on his blanket, making it physically impossible for him to slam the van doors.",
            choices: [{ text: "Break Off Questioning", action: "close" }]
        },
        van: {
            text: "<strong>FORENSIC MATRIX: CRIME SITE DISGUISED VAN</strong><br><br>The unmarked white cargo van utilized during the 17:38 abduction vector. The magnetic yellow construction tag paste-ups were clearly added hastily to hide the transport from area patrols. Inside the main flooring boards, tracking teams recovered trace cardboard fragments matching a freshly sliced Pokémon booster box layout.",
            choices: [{ text: "Break Off Questioning", action: "close" }]
        }
    };

    // --- CHARACTER ANIMATION / INTERACTION LOOPS ---
    const keys = { w: false, a: false, s: false, d: false };
    let moveSpeed = 0.16;
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let cameraRotation = { yaw: 0, pitch: 0 };

    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

    window.addEventListener('mousedown', (e) => { 
        isDragging = true; 
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
        if (isDragging && dialogueWindow.style.display !== 'block') {
            const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
            
            cameraRotation.yaw -= deltaMove.x * 0.003;
            cameraRotation.pitch -= deltaMove.y * 0.003;
            cameraRotation.pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, cameraRotation.pitch));

            camera.quaternion.setFromEuler(new THREE.Euler(cameraRotation.pitch, cameraRotation.yaw, 0, 'YXZ'));
        }
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'e' && activeNpc) {
            triggerDialogue(activeNpc.userData.name);
        }
    });

    const promptElement = document.getElementById('interaction-prompt');
    const dialogueWindow = document.getElementById('dialogue-window');
    const dialogueContent = document.getElementById('dialogue-content');

    function triggerDialogue(npcKey) {
        keys.w = keys.a = keys.s = keys.d = false; 
        promptElement.style.display = "none";
        
        const data = caseFiles[npcKey];
        let html = `<p>${data.text}</p><div class="btn-choices">`;
        data.choices.forEach(c => {
            html += `<button class="btn ${c.action.includes('accuse') ? 'btn-danger' : ''}" onclick="uiAction('${c.action}')">${c.text}</button>`;
        });
        html += `</div>`;
        
        dialogueContent.innerHTML = html;
        dialogueWindow.style.display = "block";
    }

    function uiAction(action) {
        if (action === "close") {
            dialogueWindow.style.display = "none";
        } else if (action === "accuse_alex") {
            dialogueContent.innerHTML = `
                <h2 style="color:#22c55e; margin:0 0 12px 0;">CASE RESOLVED SUMMARY 🟢</h2>
                <p>"Our detective has solved the case..."</p>
                <p><strong>Alexander Foed Hungary is guilty!</strong> Faced with your compiled tracking proof highlighting the broken restroom timeline loop where he escaped through the back window, he confessed to the kidnapping. Driven by intense jealousy and competition to win his Pokémon showdown match, he staged the entire operation using the construction disguise van. Gregory was successfully recovered safely! Excellent work!</p>
                <button class="btn" onclick="location.reload()">Restart Simulation</button>
            `;
        }
    }

    // --- ENGINE TICK ANIMATION RENDERING ---
    function animate() {
        requestAnimationFrame(animate);

        if (dialogueWindow.style.display !== 'block') {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(right, moveSpeed);

            // Confined boundaries layout limits
            camera.position.x = Math.max(-45, Math.min(45, camera.position.x));
            camera.position.z = Math.max(-45, Math.min(45, camera.position.z));
        }

        // Animate human models arms/limbs subtly to make them feel alive
        const time = Date.now() * 0.003;
        npcs.forEach(npc => {
            if(npc.userData.name !== "van") {
                // Subtle breathing animation on arms
                npc.children[5].rotation.z = Math.sin(time) * 0.05;
                npc.children[6].rotation.z = -Math.sin(time) * 0.05;
            }
        });

        // Proximity detection setup
        let closeToTarget = false;
        for (let npc of npcs) {
            let dist = camera.position.distanceTo(npc.position);
            if (dist < 4.8) {
                activeNpc = npc;
                closeToTarget = true;
                if (dialogueWindow.style.display !== 'block') {
                    promptElement.innerHTML = `PRESS [ E ] TO INVESTIGATE ${npc.userData.label.toUpperCase()}`;
                    promptElement.style.display = "block";
                }
                break;
            }
        }
        if (!closeToTarget) {
            activeNpc = null;
            promptElement.style.display = "none";
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    setTimeout(() => { triggerDialogue('intro'); }, 400);
</script>
</body>
</html>
