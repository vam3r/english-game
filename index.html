<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pokémon Card Kidnapping - Interactive 3D Case File</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #090d16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .interactive { pointer-events: auto; }
        
        .hud-top {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 700px;
            margin: 0 auto;
            backdrop-filter: blur(8px);
            text-align: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
        }
        h1 { color: #f43f5e; margin: 0 0 4px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .credits { color: #94a3b8; font-size: 12px; margin: 0 0 8px 0; font-style: italic; font-weight: bold; }
        .controls-hint { color: #38bdf8; font-size: 13px; font-weight: bold; margin: 0; }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }

        #interaction-prompt {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f43f5e;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            display: none;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
            z-index: 15;
        }

        .dialogue-box {
            background: rgba(10, 10, 14, 0.98);
            border: 2px solid #3b82f6;
            padding: 24px;
            border-radius: 8px;
            max-width: 720px;
            width: 90%;
            margin: 0 auto 15px auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 45px rgba(0,0,0,0.85);
            display: none;
        }
        .dialogue-box p { font-size: 14.5px; line-height: 1.6; margin: 0 0 15px 0; color: #e4e4e7; }
        
        .timeline-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .timeline-table th, .timeline-table td {
            border: 1px solid #3f3f46;
            padding: 6px 10px;
            text-align: left;
        }
        .timeline-table th { background: #1e293b; color: #38bdf8; }

        .btn-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: #27272a;
            color: #fff;
            border: 1px solid #52525b;
            padding: 11px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13.5px;
            transition: all 0.2s;
        }
        .btn:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-danger { background: #991b1b; border-color: #dc2626; grid-column: span 2; font-weight: bold; }
        .btn-danger:hover { background: #dc2626; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>

    <div id="ui-overlay">
        <div class="hud-top interactive">
            <h1>The Pokémon Card Kidnapping</h1>
            <div class="credits">Case File Compiled by: Graham, Jayden, Rodrigo, Arav</div>
            <p class="controls-hint">⌨️ WALK: W, A, S, D | 🖱️ LOOK AROUND: CLICK & DRAG MOUSE</p>
        </div>

        <div id="interaction-prompt">PRESS [ E ] TO INVESTIGATE</div>

        <div class="dialogue-box interactive" id="dialogue-window">
            <div id="dialogue-content"></div>
        </div>
    </div>

<script>
    // --- SCENE & GRAPHICS INITIALIZATION ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080c14);
    scene.fog = new THREE.FogExp2(0x080c14, 0.022);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.2, 30); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // --- SCENE LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    const addDistrictLight = (x, z, color, intensity) => {
        const light = new THREE.PointLight(color, intensity, 35);
        light.position.set(x, 8, z);
        scene.add(light);
        
        const structuralPost = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 8), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
        structuralPost.position.set(x, 4, z);
        scene.add(structuralPost);

        const glassBulb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshBasicMaterial({ color: color }));
        glassBulb.position.set(x, 8, z);
        scene.add(glassBulb);
    };
    addDistrictLight(-20, -5, 0x3b82f6, 1.3); // Pokémon Store Glow
    addDistrictLight(20, -5, 0x22c55e, 1.3);  // Gas Station Glow
    addDistrictLight(0, 12, 0xeab308, 1.1);   // Bus Stop / Corner Glow

    // --- STRUCTURAL LAYOUT MAP ---
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.5 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const spawnBuilding = (w, h, d, x, z, color) => {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h/2, z);
        scene.add(mesh);
    };
    spawnBuilding(22, 9, 14, -22, -14, 0x1e3a8a); // Pokémon Store Structure
    spawnBuilding(22, 9, 14, 22, -14, 0x064e3b);  // Gas Station Structure
    spawnBuilding(7, 4.5, 3.5, 0, 16, 0x334155); // Bus Stop Sheltering Frame

    // Rodrigo's Lemonade Stand Object
    spawnBuilding(3.5, 1.6, 2, -10, 6, 0xf59e0b);

    // --- DETAILED CHARACTER MODEL BUILDER (REPLACING CIRCLES/CYLINDERS) ---
    const npcs = [];
    let activeNpc = null;

    function buildDetailedHuman(shirtColor, pantsColor, skinColor, hairColor) {
        const humanGroup = new THREE.Group();

        // Torso / Shirt Segment
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.75, 1.1, 0.38), new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.7 }));
        torso.position.y = 1.35;
        humanGroup.add(torso);

        // Head Block
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.48, 0.45), new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.8 }));
        head.position.y = 2.14;
        humanGroup.add(head);

        // Detailed Hair Cap Over Head
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.18, 0.48), new THREE.MeshStandardMaterial({ color: hairColor }));
        hair.position.set(0, 2.36, -0.02);
        humanGroup.add(hair);

        // Realistic Visual Eyes
        const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.04);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.12, 2.18, 0.22); humanGroup.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.12, 2.18, 0.22); humanGroup.add(rightEye);

        // Left Leg Block
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.8, 0.28), new THREE.MeshStandardMaterial({ color: pantsColor }));
        leftLeg.position.set(-0.2, 0.4, 0);
        humanGroup.add(leftLeg);

        // Right Leg Block
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.8, 0.28), new THREE.MeshStandardMaterial({ color: pantsColor }));
        rightLeg.position.set(0.2, 0.4, 0);
        humanGroup.add(rightLeg);

        // Left Arm Segment
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.24), new THREE.MeshStandardMaterial({ color: shirtColor }));
        leftArm.position.set(-0.49, 1.25, 0);
        humanGroup.add(leftArm);

        // Right Arm Segment
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.24), new THREE.MeshStandardMaterial({ color: shirtColor }));
        rightArm.position.set(0.49, 1.25, 0);
        humanGroup.add(rightArm);

        return humanGroup;
    }

    function generateSuspect(x, z, shirt, pants, skin, hair, key, title) {
        const characterModel = buildDetailedHuman(shirt, pants, skin, hair);
        characterModel.position.set(x, 0, z);
        characterModel.userData = { name: key, label: title };
        scene.add(characterModel);
        npcs.push(characterModel);

        // Visual Interactivity Floor Beacon Ring
        const ringGeo = new THREE.RingGeometry(0.8, 1.0, 16);
        const ringMat = new THREE.MeshBasicMaterial({ color: shirt, side: THREE.DoubleSide });
        const floorBeacon = new THREE.Mesh(ringGeo, ringMat);
        floorBeacon.rotation.x = Math.PI / 2;
        floorBeacon.position.set(x, 0.04, z);
        scene.add(floorBeacon);
    }

    // --- SPAWNING ALL 5 SUSPECTS FROM THE PLANNING DOCUMENT ---
    generateSuspect(14, -3, 0xdc2626, 0x1f2937, 0xffdbac, 0x451a03, "alexander", "Alexander Foed Hungary"); 
    generateSuspect(-14, -3, 0x2563eb, 0x3f3f46, 0xe0a96d, 0x18181b, "shopkeeper", "The Pokémon Shopkeeper");
    generateSuspect(-10, 8, 0xeab308, 0x0284c7, 0xc58c85, 0x27272a, "rodrigo", "Rodrigo Martini");
    generateSuspect(4, 15, 0x52525b, 0x09090b, 0x8d5524, 0x52525b, "homeless", "The Homeless Man");
    generateSuspect(0, 11, 0x06b6d4, 0x4b5563, 0xffe4e6, 0xd97706, "gregory", "Gregory Mottingham (Victim File)");

    // Disguised White Cargo Van Construction Asset
    const vanGroup = new THREE.Group();
    const vanBody = new THREE.Mesh(new THREE.BoxGeometry(4.6, 3.2, 8.2), new THREE.MeshStandardMaterial({ color: 0xf4f4f5 }));
    vanBody.position.y = 1.95;
    vanGroup.add(vanBody);
    
    // Disguise Construction Overlay Panels
    const overlayGeo = new THREE.BoxGeometry(0.08, 1.1, 3.6);
    const overlayMat = new THREE.MeshStandardMaterial({ color: 0xf97316 }); // Orange Construction Sign Accent
    const panelL = new THREE.Mesh(overlayGeo, overlayMat); panelL.position.set(-2.31, 1.8, 0); vanGroup.add(panelL);
    const panelR = new THREE.Mesh(overlayGeo, overlayMat); panelR.position.set(2.31, 1.8, 0); vanGroup.add(panelR);

    const wheelGeo = new THREE.CylinderGeometry(0.68, 0.68, 0.9, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x18181b });
    const wh1 = new THREE.Mesh(wheelGeo, wheelMat); wh1.rotation.z = Math.PI/2; wh1.position.set(2.2, 0.68, 2.3); vanGroup.add(wh1);
    const wh2 = new THREE.Mesh(wheelGeo, wheelMat); wh2.rotation.z = Math.PI/2; wh2.position.set(-2.2, 0.68, 2.3); vanGroup.add(wh2);
    const wh3 = new THREE.Mesh(wheelGeo, wheelMat); wh3.rotation.z = Math.PI/2; wh3.position.set(2.2, 0.68, -2.3); vanGroup.add(wh3);
    const wh4 = new THREE.Mesh(wheelGeo, wheelMat); wh4.rotation.z = Math.PI/2; wh4.position.set(-2.2, 0.68, -2.3); vanGroup.add(wh4);
    
    vanGroup.position.set(-6, 0, -16);
    vanGroup.userData = { name: "van", label: "Disguised White Van (Crime Scene)" };
    scene.add(vanGroup);
    npcs.push(vanGroup);

    // --- GAME CASE FILES DATA ENGINE ---
    const caseFiles = {
        intro: {
            text: "<strong>CRIME DOSSIER: 23/06/2026 @ 17:38</strong><br>An 11-year-old boy named Gregory Mottingham was abducted right outside a United Kingdom Pokémon outlet after purchasing a rare item layout. Clues indicate a suspect using an unmarked white van hidden with an orange construction label overlay took him.<br><br><strong>TIMELINE SUMMARY (PART 4):</strong><br><table class="timeline-table"><tr><th>Time</th><th>Event Matrix Log</th></tr><tr><td>17:28</td><td>Gregory walks into Pokémon store</td></tr><tr><td>17:32</td><td>Gregory finds the booster box selection</td></tr><tr><td>17:33</td><td>Gregory goes to cashier terminal; Alexander logs entry right behind</td></tr><tr><td>17:34</td><td>Gregory buys the pack items for $300; Alexander fails to find the card setup</td></tr><tr><td>17:36</td><td>Gregory exits out towards street lane; Alexander trails immediately behind</td></tr><tr><td>17:38</td><td>Gregory reaches the bus stop layout corner; Alexander initiates ambush vector</td></tr></table><br>Walk near any suspect and press <strong>[ E ]</strong> to launch cross-examination files.",
            choices: [{ text: "Open Active Interrogations", action: "close" }]
        },
        alexander: {
            text: "<strong>SUSPECT SEARCH PROTOCOL: ALEXANDER FOED HUNGARY</strong><br><br>• <strong>Motive Profile:</strong> Wanted to kill or eliminate obstacles to get the exclusive card item, ensuring he remained the solitary collector in the city to beat his companion in an upcoming Pokémon showdown simulation.<br>• <strong>Alibi Defense:</strong> 'I was locked inside the local gas station restroom toilets across the lane during those exact timeline frames. I was never outside!'<br>• <strong>Forensic Defect:</strong> Station CCTV frames prove he walked into the bathroom corridor branch line before 17:38... <strong>but he never came back out past the register counters</strong>. The back emergency window frame was completely unbolted!",
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST ALEXANDER FOR THE CRIME", action: "accuse_alex" }]
        },
        gregory: {
            text: "<strong>SUSPECT PROFILE FILE: GREGORY MOTTINGHAM (VICTIM VECTOR)</strong><br><br>• <strong>The Theory:</strong> Investigated under the premise that he wanted to 'disappear' permanently to sell his high-stakes card items in a distant city to evade going to school. He previously skipped classes to travel out to a Poké-Con convention.<br>• <strong>Alibi Check:</strong> Physical timeline metrics confirm he was intercepted by force near the bus line grid. He didn't kidnap himself; the white construction van files prove third-party coercion.",
            choices: [{ text: "End Cross-Examination", action: "close" }]
        },
        shopkeeper: {
            text: "<strong>SUSPECT SEARCH PROTOCOL: THE POKÉMON SHOPKEEPER</strong><br><br>• <strong>Motive Profile:</strong> Accused of deploying internal swap scams where he sold counterfeits for top dollar and needed to eliminate tracking traces.<br>• <strong>Alibi Defense:</strong> Proved he stayed stranded at the main register transaction monitor talking to his associate companion over digital mobile networks.<br>• <strong>Verification Status:</strong> Automated network switch tallies fully protect his timeline loop.",
            choices: [{ text: "End Cross-Examination", action: "close" }]
        },
        rodrigo: {
            text: "<strong>SUSPECT SEARCH PROTOCOL: RODRIGO MARTINI</strong><br><br>• <strong>Motive Profile:</strong> Managed a lemonade batch stand outside. Saved up earnings to buy Robux digital gift card items, stepping inside the store exactly as Gregory bought his cards. Finding no stock, he walked out onto the pavement lane at the exact matching timestamp.<br>• <strong>Verification Status:</strong> Public street CCTV files confirm his hands were empty and he moved directly away from the van axis point.",
            choices: [{ text: "End Cross-Examination", action: "close" }]
        },
        homeless: {
            text: "<strong>SUSPECT SEARCH PROTOCOL: THE HOMELESS MAN</strong><br><br>• <strong>Motive Profile:</strong> Stationed on the corner edge grid, he saw the full exchange. If he pocketed a asset setup value of $300, he could get back on his feet.<br>• <strong>Alibi Defense:</strong> Static tracking files show he never left his layout blanket station, making it physically impossible for him to secure the van's sliding rear locking nodes.",
            choices: [{ text: "End Cross-Examination", action: "close" }]
        },
        van: {
            text: "<strong>CRIME SCENE DATA: DISGUISED WHITE VEHICLE</strong><br><br>Inside the abandoned white utility transport, forensic teams identified a discarded mask element and torn booster cardboard trimmings. The orange magnetic construction overlay labels match Alexander's fingerprints perfectly, exposing his disguise strategy.",
            choices: [{ text: "End Cross-Examination", action: "close" }]
        }
    };

    // --- CONTROLS AND MATH ENGINE LOOPS ---
    const keys = { w: false, a: false, s: false, d: false };
    let moveSpeed = 0.16;
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let cameraRotation = { yaw: 0, pitch: 0 };

    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

    window.addEventListener('mousedown', (e) => { 
        isDragging = true; 
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
        if (isDragging && dialogueWindow.style.display !== 'block') {
            const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
            
            cameraRotation.yaw -= deltaMove.x * 0.0025;
            cameraRotation.pitch -= deltaMove.y * 0.0025;
            cameraRotation.pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, cameraRotation.pitch));

            camera.quaternion.setFromEuler(new THREE.Euler(cameraRotation.pitch, cameraRotation.yaw, 0, 'YXZ'));
        }
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'e' && activeNpc) {
            triggerDialogue(activeNpc.userData.name);
        }
    });

    const promptElement = document.getElementById('interaction-prompt');
    const dialogueWindow = document.getElementById('dialogue-window');
    const dialogueContent = document.getElementById('dialogue-content');

    function triggerDialogue(npcKey) {
        keys.w = keys.a = keys.s = keys.d = false; 
        promptElement.style.display = "none";
        
        const data = caseFiles[npcKey];
        let html = `<p>${data.text}</p><div class="btn-choices">`;
        data.choices.forEach(c => {
            html += `<button class="btn ${c.action.includes('accuse') ? 'btn-danger' : ''}" onclick="uiAction('${c.action}')">${c.text}</button>`;
        });
        html += `</div>`;
        
        dialogueContent.innerHTML = html;
        dialogueWindow.style.display = "block";
    }

    function uiAction(action) {
        if (action === "close") {
            dialogueWindow.style.display = "none";
        } else if (action === "accuse_alex") {
            dialogueContent.innerHTML = `
                <h2 style="color:#22c55e; margin:0 0 10px 0;">"Our detective has solved the case..." 🟢</h2>
                <p><strong>Alexander Foed Hungary is GUILTY!</strong> Driven by intense competition and jealousy, he engineered the plot to steal Gregory's booster cards to secure an advantage over his friend in the Pokémon showdown match.</p>
                <p>When presented with the gas station CCTV gap showing he broke out of the unbolted restroom back window to intercept the victim, he confessed. Gregory was successfully recovered safe and unhurt. Excellent teamwork, detectives!</p>
                <button class="btn" onclick="location.reload()">Reset Investigation Simulation</button>
            `;
        }
    }

    // --- GAME RENDERING AND ANIMATION TICK ---
    function animate() {
        requestAnimationFrame(animate);

        if (dialogueWindow.style.display !== 'block') {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(right, moveSpeed);

            camera.position.x = Math.max(-45, Math.min(45, camera.position.x));
            camera.position.z = Math.max(-45, Math.min(45, camera.position.z));
        }

        // Subtly animate human limbs to make characters feel alive
        const pulseTime = Date.now() * 0.0025;
        npcs.forEach(npc => {
            if(npc.userData.name !== "van") {
                // Breathing shift simulation on arm attachments
                npc.children[6].rotation.z = Math.sin(pulseTime) * 0.04;
                npc.children[7].rotation.z = -Math.sin(pulseTime) * 0.04;
            }
        });

        // Target proximity checking loop
        let targetFound = false;
        for (let npc of npcs) {
            let spaceDist = camera.position.distanceTo(npc.position);
            if (spaceDist < 4.6) {
                activeNpc = npc;
                targetFound = true;
                if (dialogueWindow.style.display !== 'block') {
                    promptElement.innerHTML = `PRESS [ E ] TO INVESTIGATE ${npc.userData.label.toUpperCase()}`;
                    promptElement.style.display = "block";
                }
                break;
            }
        }
        if (!targetFound) {
            activeNpc = null;
            promptElement.style.display = "none";
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    setTimeout(() => { triggerDialogue('intro'); }, 400);
</script>
</body>
</html>
