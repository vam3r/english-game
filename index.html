<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pokémon Card Kidnapping - Interactive 3D Case File</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #090d16;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .interactive { pointer-events: auto; }
        
        .hud-top {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 700px;
            margin: 0 auto;
            backdrop-filter: blur(8px);
            text-align: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.6);
        }
        h1 { color: #f43f5e; margin: 0 0 4px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .credits { color: #94a3b8; font-size: 12px; margin: 0 0 8px 0; font-style: italic; font-weight: bold; }
        .controls-hint { color: #38bdf8; font-size: 13px; font-weight: bold; margin: 0; }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }

        #interaction-prompt {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f43f5e;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            display: none;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
            z-index: 15;
        }

        .dialogue-box {
            background: rgba(10, 10, 14, 0.98);
            border: 2px solid #3b82f6;
            padding: 24px;
            border-radius: 8px;
            max-width: 720px;
            width: 90%;
            margin: 0 auto 15px auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 45px rgba(0,0,0,0.85);
            display: none;
        }
        .dialogue-box p { font-size: 14.5px; line-height: 1.6; margin: 0 0 15px 0; color: #e4e4e7; }
        
        .timeline-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }
        .timeline-table th, .timeline-table td {
            border: 1px solid #3f3f46;
            padding: 6px 10px;
            text-align: left;
        }
        .timeline-table th { background: #1e293b; color: #38bdf8; }

        .btn-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: #27272a;
            color: #fff;
            border: 1px solid #52525b;
            padding: 11px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13.5px;
            transition: all 0.2s;
        }
        .btn:hover { background: #3b82f6; color: white; border-color: #3b82f6; }
        .btn-danger { background: #991b1b; border-color: #dc2626; grid-column: span 2; font-weight: bold; }
        .btn-danger:hover { background: #dc2626; }

        /* --- CINEMATIC SNIPER SCOPE OVERLAYS --- */
        #sniper-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.98) 55%);
            z-index: 100;
            pointer-events: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #scope-ring {
            width: 360px;
            height: 360px;
            border: 4px dashed #ef4444;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spinScope 20s linear infinite;
        }
        @keyframes spinScope { 100% { transform: rotate(360deg); } }
        #scope-cross-h { width: 500px; height: 2px; background: rgba(239, 68, 68, 0.9); position: absolute; }
        #scope-cross-v { width: 2px; height: 500px; background: rgba(239, 68, 68, 0.9); position: absolute; }
        #laser-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; box-shadow: 0 0 15px #ef4444; }
        
        #sniper-hud-text {
            color: #ef4444;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            margin-top: 35px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(239,68,68,0.6);
        }

        #flash-bang {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            z-index: 150;
            opacity: 0;
            pointer-events: none;
        }

        #death-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #050508;
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>
    <div id="flash-bang"></div>

    <!-- Sniper Scope View Overlay -->
    <div id="sniper-overlay">
        <div id="scope-ring">
            <div id="scope-cross-h"></div>
            <div id="scope-cross-v"></div>
            <div id="laser-dot"></div>
        </div>
        <div id="sniper-hud-text">FEED ACQUIRED</div>
    </div>

    <!-- Death Engine Overlay -->
    <div id="death-screen" class="interactive">
        <h1 style="color: #dc2626; font-size: 45px; letter-spacing: 4px; margin-bottom: 10px;">TACTICAL ELIMINATION</h1>
        <p id="death-reason" style="color: #a1a1aa; font-size: 16px; max-width: 600px; line-height: 1.6; margin: 0 auto 25px auto; padding: 0 20px;"></p>
        <button class="btn" onclick="location.reload()" style="padding: 14px 35px; font-weight: bold; letter-spacing: 1px;">RETRY INVESTIGATION MATRIX</button>
    </div>

    <div id="ui-overlay">
        <div class="hud-top interactive">
            <h1>The Pokémon Card Kidnapping</h1>
            <div class="credits">Case File Compiled by: Graham, Jayden, Rodrigo, Arav[cite: 3]</div>
            <p class="controls-hint">⌨️ WALK: W, A, S, D | 🖱️ LOOK AROUND: CLICK & DRAG MOUSE</p>
        </div>

        <div id="interaction-prompt">PRESS [ E ] TO INVESTIGATE</div>

        <div class="dialogue-box interactive" id="dialogue-window">
            <div id="dialogue-content"></div>
        </div>
    </div>

<script>
    // --- SCENE & GRAPHICS INITIALIZATION ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080c14);
    scene.fog = new THREE.FogExp2(0x080c14, 0.022);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2.2, 30); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // --- SCENE LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    const addDistrictLight = (x, z, color, intensity) => {
        const light = new THREE.PointLight(color, intensity, 35);
        light.position.set(x, 8, z);
        scene.add(light);
        
        const structuralPost = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 8), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
        structuralPost.position.set(x, 4, z);
        scene.add(structuralPost);

        const glassBulb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshBasicMaterial({ color: color }));
        glassBulb.position.set(x, 8, z);
        scene.add(glassBulb);
    };
    addDistrictLight(-20, -5, 0x3b82f6, 1.3); // Pokémon Store
    addDistrictLight(20, -5, 0x22c55e, 1.3);  // Gas Station
    addDistrictLight(0, 12, 0xeab308, 1.1);   // Bus Stop

    // --- STRUCTURAL LAYOUT MAP ---
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.5 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const spawnBuilding = (w, h, d, x, z, color) => {
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, h/2, z);
        scene.add(mesh);
    };
    spawnBuilding(22, 9, 14, -22, -14, 0x1e3a8a); // Pokémon Store Structure
    spawnBuilding(22, 9, 14, 22, -14, 0x064e3b);  // Gas Station Structure
    spawnBuilding(7, 4.5, 3.5, 0, 16, 0x334155); // Bus Stop Sheltering Frame

    // Rodrigo's Lemonade Stand Object
    spawnBuilding(3.5, 1.6, 2, -10, 6, 0xf59e0b);

    // Sniper Target Hardware Constants
    const sniperPosition = new THREE.Vector3(22, 9.5, -14); 

    // --- DETAILED CHARACTER MODEL BUILDER[cite: 3] ---
    const npcs = [];
    let activeNpc = null;
    let isDead = false;
    let sniperCutsceneActive = false;
    let playerDummyGroup = null;
    let shatteredPieces = [];

    function buildDetailedHuman(shirtColor, pantsColor, skinColor, hairColor) {
        const humanGroup = new THREE.Group();

        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.75, 1.1, 0.38), new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.7 }));
        torso.position.y = 1.35;
        humanGroup.add(torso);

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.48, 0.45), new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.8 }));
        head.position.y = 2.14;
        humanGroup.add(head);

        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.18, 0.48), new THREE.MeshStandardMaterial({ color: hairColor }));
        hair.position.set(0, 2.36, -0.02);
        humanGroup.add(hair);

        const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.04);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.12, 2.18, 0.22); humanGroup.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.12, 2.18, 0.22); humanGroup.add(rightEye);

        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.8, 0.28), new THREE.MeshStandardMaterial({ color: pantsColor }));
        leftLeg.position.set(-0.2, 0.4, 0);
        humanGroup.add(leftLeg);

        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.8, 0.28), new THREE.MeshStandardMaterial({ color: pantsColor }));
        rightLeg.position.set(0.2, 0.4, 0);
        humanGroup.add(rightLeg);

        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.24), new THREE.MeshStandardMaterial({ color: shirtColor }));
        leftArm.position.set(-0.49, 1.25, 0);
        humanGroup.add(leftArm);

        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.85, 0.24), new THREE.MeshStandardMaterial({ color: shirtColor }));
        rightArm.position.set(0.49, 1.25, 0);
        humanGroup.add(rightArm);

        return humanGroup;
    }

    function generateSuspect(x, z, shirt, pants, skin, hair, key, title) {
        const characterModel = buildDetailedHuman(shirt, pants, skin, hair);
        characterModel.position.set(x, 0, z);
        characterModel.userData = { name: key, label: title };
        scene.add(characterModel);
        npcs.push(characterModel);

        const ringGeo = new THREE.RingGeometry(0.8, 1.0, 16);
        const ringMat = new THREE.MeshBasicMaterial({ color: shirt, side: THREE.DoubleSide });
        const floorBeacon = new THREE.Mesh(ringGeo, ringMat);
        floorBeacon.rotation.x = Math.PI / 2;
        floorBeacon.position.set(x, 0.04, z);
        scene.add(floorBeacon);
    }

    // --- SPAWNING ALL 5 SUSPECTS FROM CASE FILE[cite: 3] ---
    generateSuspect(14, -3, 0xdc2626, 0x1f2937, 0xffdbac, 0x451a03, "alexander", "Alexander Foed Hungary");[cite: 3]
    generateSuspect(-14, -3, 0x2563eb, 0x3f3f46, 0xe0a96d, 0x18181b, "shopkeeper", "The Pokémon Shopkeeper");[cite: 3]
    generateSuspect(-10, 8, 0xeab308, 0x0284c7, 0xc58c85, 0x27272a, "rodrigo", "Rodrigo Martini");[cite: 3]
    generateSuspect(4, 15, 0x52525b, 0x09090b, 0x8d5524, 0x52525b, "homeless", "The Homeless Man");[cite: 3]
    generateSuspect(0, 11, 0x06b6d4, 0x4b5563, 0xffe4e6, 0xd97706, "gregory", "Gregory Mottingham");[cite: 3]

    // Disguised White Cargo Van Construction Asset[cite: 3]
    const vanGroup = new THREE.Group();
    const vanBody = new THREE.Mesh(new THREE.BoxGeometry(4.6, 3.2, 8.2), new THREE.MeshStandardMaterial({ color: 0xf4f4f5 }));
    vanBody.position.y = 1.95;
    vanGroup.add(vanBody);
    
    const overlayGeo = new THREE.BoxGeometry(0.08, 1.1, 3.6);
    const overlayMat = new THREE.MeshStandardMaterial({ color: 0xf97316 }); 
    const panelL = new THREE.Mesh(overlayGeo, overlayMat); panelL.position.set(-2.31, 1.8, 0); vanGroup.add(panelL);
    const panelR = new THREE.Mesh(overlayGeo, overlayMat); panelR.position.set(2.31, 1.8, 0); vanGroup.add(panelR);

    const wheelGeo = new THREE.CylinderGeometry(0.68, 0.68, 0.9, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x18181b });
    const wh1 = new THREE.Mesh(wheelGeo, wheelMat); wh1.rotation.z = Math.PI/2; wh1.position.set(2.2, 0.68, 2.3); vanGroup.add(wh1);
    const wh2 = new THREE.Mesh(wheelGeo, wheelMat); wh2.rotation.z = Math.PI/2; wh2.position.set(-2.2, 0.68, 2.3); vanGroup.add(wh2);
    const wh3 = new THREE.Mesh(wheelGeo, wheelMat); wh3.rotation.z = Math.PI/2; wh3.position.set(2.2, 0.68, -2.3); vanGroup.add(wh3);
    const wh4 = new THREE.Mesh(wheelGeo, wheelMat); wh4.rotation.z = Math.PI/2; wh4.position.set(-2.2, 0.68, -2.3); vanGroup.add(wh4);
    
    vanGroup.position.set(-6, 0, -16);
    vanGroup.userData = { name: "van", label: "Disguised White Van" };[cite: 3]
    scene.add(vanGroup);
    npcs.push(vanGroup);

    // --- GAME CASE FILES DATA ENGINE ---
    const caseFiles = {
        intro: {
            text: `<strong>CRIME DOSSIER: 23/06/2026 @ 17:38</strong><br>An 11-year-old boy named Gregory Mottingham was abducted right outside a United Kingdom Pokémon outlet after purchasing a rare item layout[cite: 3]. Clues indicate a suspect using an unmarked white van hidden with an orange construction label overlay took him[cite: 3].<br><br><strong>TIMELINE SUMMARY:</strong><br><table class='timeline-table'><tr><th>Time</th><th>Event Matrix Log</th></tr><tr><td>17:28</td><td>Gregory walks into Pokémon store</td></tr><tr><td>17:32</td><td>Gregory finds the booster box selection</td></tr><tr><td>17:33</td><td>Gregory goes to cashier terminal; Alexander logs entry right behind</td></tr><tr><td>17:34</td><td>Gregory buys the pack items for $300; Alexander fails to find the card setup</td></tr><tr><td>17:36</td><td>Gregory exits out towards street lane; Alexander trails immediately behind</td></tr><tr><td>17:38</td><td>Gregory reaches the bus stop layout corner; Alexander initiates ambush vector</td></tr></table><br>Walk near any suspect and press <strong>[ E ]</strong> to launch cross-examination files.`,
            choices: [{ text: "Open Active Interrogations", action: "close" }]
        },
        alexander: {
            text: `<strong>SUSPECT SEARCH PROTOCOL: ALEXANDER FOED HUNGARY[cite: 3]</strong><br><br>• <strong>Motive Profile:</strong> Wanted to eliminate obstacles to get the exclusive card item, ensuring he remained the solitary collector in the city to beat his companion in an upcoming Pokémon showdown simulation[cite: 3].<br>• <strong>Alibi Defense:</strong> 'I was locked inside the local gas station restroom toilets across the lane during those exact timeline frames. I was never outside!'[cite: 3]<br>• <strong>Forensic Defect:</strong> Station CCTV frames prove he walked into the bathroom corridor branch line before 17:38... <strong>but he never came back out past the register counters</strong>[cite: 3]. The back emergency window frame was completely unbolted!`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST ALEXANDER FOR THE CRIME", action: "accuse_alex" }]
        },
        gregory: {
            text: `<strong>SUSPECT PROFILE FILE: GREGORY MOTTINGHAM[cite: 3]</strong><br><br>• <strong>The Theory:</strong> Investigated under the premise that he wanted to 'disappear' permanently to sell his high-stakes card items in another place to evade going to school[cite: 3].<br>• <strong>Alibi Check:</strong> Why would he kidnap himself? Physical timeline metrics confirm he was intercepted by force near the bus line grid[cite: 3].`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST GREGORY MOTTINGHAM", action: "accuse_wrong_gregory" }]
        },
        shopkeeper: {
            text: `<strong>SUSPECT SEARCH PROTOCOL: THE POKÉMON SHOPKEEPER[cite: 3]</strong><br><br>• <strong>Motive Profile:</strong> Accused of deploying internal swap scams where he sold counterfeits for top dollar and needed to eliminate tracking traces[cite: 3].<br>• <strong>Alibi Defense:</strong> Proved he stayed stranded at the main register transaction monitor talking to his associate companion over digital mobile networks[cite: 3].`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST THE SHOPKEEPER", action: "accuse_wrong_shopkeeper" }]
        },
        rodrigo: {
            text: `<strong>SUSPECT SEARCH PROTOCOL: RODRIGO MARTINI[cite: 3]</strong><br><br>• <strong>Motive Profile:</strong> Managed a lemonade batch stand outside[cite: 3]. Saved up earnings to buy Robux digital gift card items, stepping inside the store exactly as Gregory bought his cards[cite: 3]. Finding no stock, he walked out onto the pavement lane at the exact matching timestamp[cite: 3].`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST RODRIGO MARTINI", action: "accuse_wrong_rodrigo" }]
        },
        homeless: {
            text: `<strong>SUSPECT SEARCH PROTOCOL: THE HOMELESS MAN[cite: 3]</strong><br><br>• <strong>Motive Profile:</strong> Stationed on the corner edge grid, he saw the full exchange[cite: 3]. If he pocketed an asset setup value of $300, he could get back on his feet[cite: 3].`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ ARREST THE HOMELESS MAN", action: "accuse_wrong_homeless" }]
        },
        van: {
            text: `<strong>CRIME SCENE DATA: DISGUISED WHITE VEHICLE[cite: 3]</strong><br><br>Inside the abandoned white utility transport, forensic teams identified a discarded mask element and torn booster cardboard trimmings[cite: 3]. The orange magnetic construction overlay labels match Alexander's fingerprints perfectly, exposing his disguise strategy[cite: 3].`,
            choices: [{ text: "End Cross-Examination", action: "close" }, { text: "⚖️ SEIZE VEHICLE AS MAIN CULPRIT", action: "accuse_wrong_van" }]
        }
    };

    // --- CONTROLS AND MATH ENGINE LOOPS ---
    const keys = { w: false, a: false, s: false, d: false };
    let moveSpeed = 0.16;
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let cameraRotation = { yaw: 0, pitch: 0 };

    window.addEventListener('keydown', (e) => { if(!isDead && !sniperCutsceneActive && e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(!isDead && !sniperCutsceneActive && e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

    window.addEventListener('mousedown', (e) => { 
        if(!isDead && !sniperCutsceneActive) { isDragging = true; previousMousePosition = { x: e.clientX, y: e.clientY }; }
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
        if (isDragging && dialogueWindow.style.display !== 'block' && !isDead && !sniperCutsceneActive) {
            const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
            cameraRotation.yaw -= deltaMove.x * 0.0025;
            cameraRotation.pitch -= deltaMove.y * 0.0025;
            cameraRotation.pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, cameraRotation.pitch));
            camera.quaternion.setFromEuler(new THREE.Euler(cameraRotation.pitch, cameraRotation.yaw, 0, 'YXZ'));
        }
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('keydown', (e) => {
        if (!isDead && !sniperCutsceneActive && e.key.toLowerCase() === 'e' && activeNpc) {
            triggerDialogue(activeNpc.userData.name);
        }
    });

    const promptElement = document.getElementById('interaction-prompt');
    const dialogueWindow = document.getElementById('dialogue-window');
    const dialogueContent = document.getElementById('dialogue-content');

    function triggerDialogue(npcKey) {
        keys.w = keys.a = keys.s = keys.d = false; 
        promptElement.style.display = "none";
        
        const data = caseFiles[npcKey];
        let html = `<p>${data.text}</p><div class="btn-choices">`;
        data.choices.forEach(c => {
            html += `<button class="btn ${c.action.includes('accuse') ? 'btn-danger' : ''}" onclick="uiAction('${c.action}')">${c.text}</button>`;
        });
        html += `</div>`;
        
        dialogueContent.innerHTML = html;
        dialogueWindow.style.display = "block";
    }

    function uiAction(action) {
        if (action === "close") {
            dialogueWindow.style.display = "none";
        } else if (action === "accuse_alex") {
            dialogueContent.innerHTML = `
                <h2 style="color:#22c55e; margin:0 0 10px 0;">"Our detective has solved the case..." 🟢</h2>
                <p><strong>Alexander Foed Hungary is GUILTY![cite: 3]</strong> Driven by intense competition and jealousy, he engineered the plot to steal Gregory's booster cards to secure an advantage over his friend in the Pokémon showdown match[cite: 3].</p>
                <p>When presented with the gas station CCTV gap showing he broke out of the unbolted restroom back window to intercept the victim, he confessed[cite: 3]. Gregory was successfully recovered safe and unhurt[cite: 3]. Excellent teamwork, detectives!</p>
                <button class="btn" onclick="location.reload()">Reset Investigation Simulation</button>
            `;
        } else if (action.startsWith("accuse_wrong_")) {
            const victimTarget = action.replace("accuse_wrong_", "").toUpperCase();
            dialogueWindow.style.display = "none";
            executeSniperPunishment(victimTarget);
        }
    }

    // --- TACTICAL SNIPER PERSPECTIVE ENGINE ---
    function executeSniperPunishment(targetName) {
        sniperCutsceneActive = true;
        keys.w = keys.a = keys.s = keys.d = false;

        const sniperOverlay = document.getElementById('sniper-overlay');
        const sniperHudText = document.getElementById('sniper-hud-text');
        const flashBang = document.getElementById('flash-bang');
        const deathScreen = document.getElementById('death-screen');
        const deathReason = document.getElementById('death-reason');

        // Step 1: Capture Detective's old standing footprint & spawn physical copy model
        const savedPlayerPos = camera.position.clone();
        savedPlayerPos.y = 0; // Ground height placement

        playerDummyGroup = buildDetailedHuman(0x3f3f46, 0x18181b, 0xffdbac, 0x27272a); // Grey Coat Detective Skin
        playerDummyGroup.position.copy(savedPlayerPos);
        // Force model to turn and face towards the gas station roof threat location
        playerDummyGroup.lookAt(sniperPosition.x, 0, sniperPosition.z);
        scene.add(playerDummyGroup);

        // Step 2: Instantly jump camera perspective into Sniper's Eye Scope on the Roof looking down
        camera.position.copy(sniperPosition);
        camera.lookAt(playerDummyGroup.position.x, 1.8, playerDummyGroup.position.z);

        sniperOverlay.style.display = 'flex';
        sniperHudText.innerHTML = `[ SCOPE ACQUIRED: VIEWING DETECTIVE ]<br>TARGET RANGE: ${Math.round(camera.position.distanceTo(playerDummyGroup.position))} METERS`;

        // Step 3: Mechanical animation simulation of weapon loading mechanics
        setTimeout(() => {
            sniperHudText.innerHTML = `[ TARGET FOCUS LOCK ]<br><span style="color:#ffffff;">*CLICK-CLACK* LOADING LAPUA MAGNUM ROUND INTO CHAMBER...</span>`;
        }, 1800);

        // Step 4: Weapon fire event & 1-Million-Pieces calculation execution matrix
        setTimeout(() => {
            flashBang.style.opacity = '1';
            
            // Shatter Engine Matrix: Replace detective body with 100 high-velocity physics components
            const colors = [0x3f3f46, 0x18181b, 0xffdbac, 0x27272a, 0xdc2626];
            const piecesCount = 100;
            
            for(let i=0; i<piecesCount; i++) {
                const size = 0.12 + Math.random() * 0.18;
                const pGeo = new THREE.BoxGeometry(size, size, size);
                const pMat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const pMesh = new THREE.Mesh(pGeo, pMat);
                
                // Spawn within the silhouette footprint bounds of the original model
                pMesh.position.set(
                    playerDummyGroup.position.x + (Math.random() - 0.5) * 0.8,
                    playerDummyGroup.position.y + Math.random() * 2.2,
                    playerDummyGroup.position.z + (Math.random() - 0.5) * 0.8
                );
                
                // Assign high-velocity blast vectors outwards from center axis point
                pMesh.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.5,
                        Math.random() * 0.6 + 0.2,
                        (Math.random() - 0.5) * 0.5
                    )
                };
                
                scene.add(pMesh);
                shatteredPieces.push(pMesh);
            }

            // Remove intact model asset immediately
            scene.remove(playerDummyGroup);

            // Clean flash presentation and yield screen space to death report logs
            setTimeout(() => {
                flashBang.style.transition = 'opacity 0.8s ease-out';
                flashBang.style.opacity = '0';
                sniperOverlay.style.display = 'none';
                isDead = true; 
                
                deathReason.innerHTML = `You wrongfully declared <strong>${targetName}</strong> as the primary culprit. The criminal organization's roof cleaner locked onto your tracking signatures, chambered a live round, and shot your structural frame into one million pieces to protect Alexander Foed Hungary's data loop[cite: 3].`;
                deathScreen.style.display = 'flex';
            }, 180);

        }, 4200);
    }

    // --- GAME RENDERING AND ANIMATION TICK ---
    function animate() {
        requestAnimationFrame(animate);

        // Core Player Controls Bounds Loop
        if (dialogueWindow.style.display !== 'block' && !isDead && !sniperCutsceneActive) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(right, moveSpeed);

            camera.position.x = Math.max(-45, Math.min(45, camera.position.x));
            camera.position.z = Math.max(-45, Math.min(45, camera.position.z));
        }

        // Keep sniper scope look calculations targeted directly at the dummy detective position
        if (sniperCutsceneActive && playerDummyGroup) {
            camera.lookAt(playerDummyGroup.position.x, 1.2, playerDummyGroup.position.z);
        }

        // Particle Physics Processing Engine for the Shattered Pieces
        if (shatteredPieces.length > 0) {
            shatteredPieces.forEach(p => {
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.015; // Gravity acceleration drop simulation
                p.rotation.x += 0.1;
                p.rotation.y += 0.1;
            });
        }

        // Subtly animate human limbs to make characters feel alive[cite: 3]
        const pulseTime = Date.now() * 0.0025;
        npcs.forEach(npc => {
            if(npc.userData.name !== "van") {
                npc.position.y = Math.sin(pulseTime + npc.position.x) * 0.04;
            }
        });

        // Target proximity checking loops
        let targetFound = false;
        for (let npc of npcs) {
            let spaceDist = camera.position.distanceTo(npc.position);
            if (spaceDist < 4.6) {
                activeNpc = npc;
                targetFound = true;
                if (dialogueWindow.style.display !== 'block' && !isDead && !sniperCutsceneActive) {
                    promptElement.innerHTML = `PRESS [ E ] TO INVESTIGATE ${npc.userData.label.toUpperCase()}`;
                    promptElement.style.display = "block";
                }
                break;
            }
        }
        if (!targetFound) {
            activeNpc = null;
            promptElement.style.display = "none";
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
    setTimeout(() => { if(!isDead && !sniperCutsceneActive) triggerDialogue('intro'); }, 400);
</script>
</body>
</html>
