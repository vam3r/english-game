<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pokémon Store Mystery - 3D Exploration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .interactive { pointer-events: auto; }
        
        /* HUD Top Styling */
        .hud-top {
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            text-align: center;
        }
        h1 { color: #ef4444; margin: 0 0 5px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .controls-hint { color: #38bdf8; font-size: 13px; font-weight: bold; margin: 0; }

        /* Crosshair for steering/looking */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
        }

        /* Proximity Prompt Interrogation Popups */
        #interaction-prompt {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239, 68, 68, 0.9);
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            display: none;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            z-index: 15;
        }

        /* Case Dialogue Windows */
        .dialogue-box {
            background: rgba(9, 9, 11, 0.95);
            border: 2px solid #f59e0b;
            padding: 20px;
            border-radius: 8px;
            max-width: 650px;
            width: 90%;
            margin: 0 auto 30px auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: none;
        }
        .dialogue-box p { font-size: 15px; line-height: 1.6; margin: 0 0 15px 0; color: #e4e4e7; }
        
        .btn-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: #27272a;
            color: #fff;
            border: 1px solid #52525b;
            padding: 10px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn:hover { background: #f59e0b; color: #000; border-color: #f59e0b; }
        .btn-danger { background: #7f1d1d; border-color: #b91c1c; grid-column: span 2; }
        .btn-danger:hover { background: #b91c1c; color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="crosshair"></div>

    <div id="ui-overlay">
        <div class="hud-top interactive">
            <h1>Mall Crime Scene Investigation</h1>
            <p class="controls-hint">⌨️ MOVE: W, A, S, D | 🖱️ LOOK: CLICK & DRAG MOUSE</p>
        </div>

        <div id="interaction-prompt">PRESS [ E ] TO INVESTIGATE</div>

        <div class="dialogue-box interactive" id="dialogue-window">
            <div id="dialogue-content"></div>
        </div>
    </div>

<script>
    // --- ENGINE & SCENE GENERATION ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);
    scene.fog = new THREE.FogExp2(0x0a0a0c, 0.025);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    // Position camera at human eye-level heights
    camera.position.set(0, 2, 25); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // --- REALISTIC MALL LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    // Neon Mall Ceiling Track Lights
    const createMallLight = (x, z, color) => {
        const light = new THREE.PointLight(color, 0.8, 25);
        light.position.set(x, 7, z);
        scene.add(light);
        
        // Visual light bulb sphere
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: color }));
        bulb.position.set(x, 7, z);
        scene.add(bulb);
    };
    createMallLight(-15, -5, 0x38bdf8); // Blue light near Pokemon
    createMallLight(15, -5, 0x22c55e);  // Green light near Gas Station
    createMallLight(0, 15, 0xeab308);   // Yellow light near witness bench

    // --- GENERATING THE MALL FLOOR AND ARCHITECTURE ---
    // Polished Reflective Mall Tile Floor
    const floorGeo = new THREE.PlaneGeometry(80, 80);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.15, metalness: 0.1 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Architectural Pillars (Cylinders instead of blocks)
    const pillarGeo = new THREE.CylinderGeometry(0.6, 0.6, 8, 16);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.5 });
    const addPillar = (x, z) => {
        const p = new THREE.Mesh(pillarGeo, pillarMat);
        p.position.set(x, 4, z);
        scene.add(p);
    };
    addPillar(-10, 5); addPillar(10, 5); addPillar(-10, -15); addPillar(10, -15);

    // --- GAME DATA INTERACTIONS ---
    const npcs = [];
    let activeNpc = null;

    // Advanced Procedural Character Creator (Generates normal looking figures instead of cubes)
    function createCharacter(x, z, outfitColor, headColor, name, labelText) {
        const group = new THREE.Group();

        // Legs/Pants (Cylinder)
        const legs = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.2, 12), new THREE.MeshStandardMaterial({ color: 0x111827 }));
        legs.position.y = 0.6;
        group.add(legs);

        // Torso/Jacket (Capsule Shape)
        const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.0, 8, 12), new THREE.MeshStandardMaterial({ color: outfitColor, roughness: 0.6 }));
        torso.position.y = 1.6;
        group.add(torso);

        // Head (Sphere)
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({ color: headColor, roughness: 0.8 }));
        head.position.y = 2.4;
        group.add(head);

        group.position.set(x, 0, z);
        group.userData = { name: name, label: labelText };
        scene.add(group);
        npcs.push(group);

        // Neon marker ring underneath character feet
        const ring = new THREE.Mesh(new THREE.RingGeometry(0.8, 1.0, 16), new THREE.MeshBasicMaterial({ color: outfitColor, side: THREE.DoubleSide }));
        ring.rotation.x = Math.PI/2;
        ring.position.set(x, 0.02, z);
        scene.add(ring);
    }

    // Spawn the Suspect Cast from the case planning document
    createCharacter(-15, -8, 0xef4444, 0xffdbac, "alexander", "Alexander Hungarian"); 
    createCharacter(15, -8, 0x22c55e, 0xe0a96d, "shopkeeper", "The Pokémon Store Clerk");
    createCharacter(-8, 12, 0x3b82f6, 0xc58c85, "rodrigo", "Rodrigo Martini");
    createCharacter(8, 12, 0x78350f, 0x8d5524, "homeless", "The Corridor Witness");

    // Kidnapping Van Scene Object (Smooth curved edges capsule van body shape)
    const vanGroup = new THREE.Group();
    const vanBody = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 7), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
    vanBody.position.y = 1.8;
    vanGroup.add(vanBody);
    // Wheels (curved cylinders)
    const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.8, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.rotation.z = Math.PI/2; w1.position.set(2, 0.6, 2); vanGroup.add(w1);
    const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.rotation.z = Math.PI/2; w2.position.set(-2, 0.6, 2); vanGroup.add(w2);
    const w3 = new THREE.Mesh(wheelGeo, wheelMat); w3.rotation.z = Math.PI/2; w3.position.set(2, 0.6, -2); vanGroup.add(w3);
    const w4 = new THREE.Mesh(wheelGeo, wheelMat); w4.rotation.z = Math.PI/2; w4.position.set(-2, 0.6, -2); vanGroup.add(w4);
    
    vanGroup.position.set(0, 0, -18);
    vanGroup.userData = { name: "van", label: "Disguised White Van" };
    scene.add(vanGroup);
    npcs.push(vanGroup);

    // --- CASE DIALOGUE SCRIPT COMPILER ---
    const caseFiles = {
        intro: {
            text: "<strong>CASE COMMENCEMENT LOG:</strong> Gregory Mottingham (Age 11) vanished at exactly 17:38 right outside this terminal space after securing a rare £300 card. Use WASD keys to physically move around the room and inspect suspects to review their alibis. Uncover who is lying to crack the kidnapping file.",
            choices: [{ text: "Begin Searching Area", action: "close" }]
        },
        alexander: {
            text: "<strong>SUSPECT INTERROGATION: ALEXANDER HUNGARIAN</strong><br><br>• <em>Motive:</em> Desperately wanted the rare Greninja card to dominate his best friend in a Pokémon showdown sequence.<br>• <em>Alibi Statement:</em> 'I wasn't outside! I was tucked away in the gas station facility's restrooms washroom stall down the corridor during those exact minutes.'<br>• <em>Digital Discovery:</em> Checking the gas station tech files reveals he entered the restroom hallway... but <strong>never walked back out past the main cameras</strong>. There's a back window left wide open!",
            choices: [{ text: "Exit Interaction", action: "close" }, { text: "⚖️ ARREST THIS SUSPECT", action: "accuse_alex" }]
        },
        shopkeeper: {
            text: "<strong>WITNESS DOSSIER: THE STORE CASHIER</strong><br><br>• <em>Statement:</em> 'Gregory paid £300 for his card boosters here at 17:34. Alexander was lurking inside right behind him, staring at the cards. I stayed stuck behind my checkout register on an active customer service phone call matching the whole incident timeline.' Verified clear.",
            choices: [{ text: "Exit Interaction", action: "close" }]
        },
        rodrigo: {
            text: "<strong>WITNESS DOSSIER: RODRIGO MARTINI</strong><br><br>• <em>Statement:</em> 'I was simply down here trying to sell fresh lemonade batches to pull together some balance for Robux cards. I saw Gregory step out into the courtyard, but I kept moving away from the vehicles.' Shop camera backup tracking confirms he's totally innocent.",
            choices: [{ text: "Exit Interaction", action: "close" }]
        },
        homeless: {
            text: "<strong>WITNESS DOSSIER: THE CORNER RESIDENT</strong><br><br>• <em>Statement:</em> 'I saw that sketchy white construction van idling outside the main doors. A guy slipped up to the kid promising a €50 transaction deal, shoved him inside, and locked the doors.' Security frames confirm this witness never left his bench slot.",
            choices: [{ text: "Exit Interaction", action: "close" }]
        },
        van: {
            text: "<strong>CRIME SCENE CLUE: DISGUISED WHITE VAN</strong><br><br>The transport used in the 17:38 abduction. It has a fake cardboard construction logo pasted on the panels to throw off patrols. Inside the cabin floorboards, forensic investigators discovered trace packaging scraps from a newly torn Pokémon booster pack...",
            choices: [{ text: "Exit Interaction", action: "close" }]
        }
    };

    // --- FIRST PERSON MOVEMENT & CAMERA SYSTEM ---
    const keys = { w: false, a: false, s: false, d: false };
    let moveSpeed = 0.15;
    
    // Smooth drag-to-look camera configuration variables
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let cameraRotation = { yaw: 0, pitch: 0 };

    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

    // Click and drag mouse to steer camera look directions naturally
    window.addEventListener('mousedown', (e) => { isDragging = true; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
        const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };

        if (isDragging && document.getElementById('dialogue-window').style.display !== 'block') {
            cameraRotation.yaw -= deltaMove.x * 0.003;
            cameraRotation.pitch -= deltaMove.y * 0.003;
            // Bound vertical looking ranges
            cameraRotation.pitch = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, cameraRotation.pitch));

            camera.quaternion.setFromEuler(new THREE.Euler(cameraRotation.pitch, cameraRotation.yaw, 0, 'YXZ'));
        }
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    // Handle Interrogation Keys
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'e' && activeNpc) {
            triggerDialogue(activeNpc.userData.name);
        }
    });

    // --- GAME ACTIONS & RESOLUTIONS ENGINE ---
    const promptElement = document.getElementById('interaction-prompt');
    const dialogueWindow = document.getElementById('dialogue-window');
    const dialogueContent = document.getElementById('dialogue-content');

    function triggerDialogue(npcKey) {
        keys.w = keys.a = keys.s = keys.d = false; // Freeze player position movement
        promptElement.style.display = "none";
        
        const data = caseFiles[npcKey];
        let html = `<p>${data.text}</p><div class="btn-choices">`;
        data.choices.forEach(c => {
            html += `<button class="btn ${c.action.includes('accuse') ? 'btn-danger' : ''}" onclick="uiAction('${c.action}')">${c.text}</button>`;
        });
        html += `</div>`;
        
        dialogueContent.innerHTML = html;
        dialogueWindow.style.display = "block";
    }

    function uiAction(action) {
        if (action === "close") {
            dialogueWindow.style.display = "none";
        } else if (action === "accuse_alex") {
            dialogueContent.innerHTML = `
                <h2 style="color:#22c55e; margin:0 0 10px 0;">CASE SOLVED SUCCESSFUL! 🟢</h2>
                <p><strong>Excellent Detective Work!</strong> You arrested Alexander Foed Hungary. When confronted with the gas station CCTV gap showing he escaped through the bathroom back window, he broke down and confessed.</p>
                <p>Driven by pure greed and intense competition to beat his best friend in an upcoming Pokémon showdown tournament, he plotted the whole heist to steal Gregory's booster cards. Gregory was safely located down the street and reunited with his cards. Your assignment project is complete!</p>
                <button class="btn" onclick="location.reload()">Reset Map Simulation</button>
            `;
        }
    }

    // --- RUN-TIME TICK LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // 1. WASD Vector Movement relative to camera perspective view vectors
        if (dialogueWindow.style.display !== 'block') {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            if (keys.w) camera.position.addScaledVector(forward, moveSpeed);
            if (keys.s) camera.position.addScaledVector(forward, -moveSpeed);
            if (keys.a) camera.position.addScaledVector(right, -moveSpeed);
            if (keys.d) camera.position.addScaledVector(right, moveSpeed);

            // Keep player bounded safely within mall courtyard floor limits
            camera.position.x = Math.max(-35, Math.min(35, camera.position.x));
            camera.position.z = Math.max(-35, Math.min(35, camera.position.z));
        }

        // 2. Real-time Proximity Check to 3D models
        let closeToTarget = false;
        for (let npc of npcs) {
            let dist = camera.position.distanceTo(npc.position);
            if (dist < 4.5) {
                activeNpc = npc;
                closeToTarget = true;
                if (dialogueWindow.style.display !== 'block') {
                    promptElement.innerHTML = `PRESS [ E ] TO INVESTIGATE ${npc.userData.label.toUpperCase()}`;
                    promptElement.style.display = "block";
                }
                break;
            }
        }
        if (!closeToTarget) {
            activeNpc = null;
            promptElement.style.display = "none";
        }

        renderer.render(scene, camera);
    }

    // Dynamic browser scaling fix mapping
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start Simulation Loop
    animate();
    setTimeout(() => { triggerDialogue('intro'); }, 400);
</script>
</body>
</html>
