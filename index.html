<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pokémon Card Kidnapping - 3D Case File</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #09090b;
            font-family: 'Courier New', Courier, monospace;
            color: #e2e8f0;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to 3D scene */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
        }
        .interactive {
            pointer-events: auto; /* Re-enable clicking for UI buttons/panels */
        }
        .header-panel {
            background: rgba(24, 24, 27, 0.85);
            border: 2px solid #3f3f46;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
            backdrop-filter: blur(4px);
        }
        h1 { color: #ef4444; margin: 0 0 5px 0; font-size: 22px; }
        .instructions { color: #f59e0b; font-size: 13px; margin: 0; }
        
        .display-panel {
            background: rgba(18, 18, 20, 0.9);
            border: 2px solid #ef4444;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            margin: 0 auto 20px auto;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.15);
        }
        p { font-size: 15px; line-height: 1.5; margin: 0 0 15px 0; }
        
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background-color: #27272a;
            color: #f4f4f5;
            border: 1px solid #52525b;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        .btn-accuse {
            background-color: #7f1d1d;
            border-color: #b91c1c;
        }
        .btn-accuse:hover {
            background-color: #b91c1c;
        }
        .success { color: #4ade80; font-weight: bold; }
        .fail { color: #f87171; font-weight: bold; }
    </style>
    <!-- Load Three.js Engine Framework from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="header-panel interactive">
            <h1>The Pokémon Card Kidnapping</h1>
            <p class="instructions">🖱️ CLICK ON THE 3D OBJECTS IN THE SCENE TO INVESTIGATE</p>
        </div>

        <div class="display-panel interactive" id="info-panel">
            <!-- Dynamic Content Injected Here -->
        </div>
    </div>

<script>
    // --- 3D ENGINE SETUP ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x09090b);
    scene.fog = new THREE.FogExp2(0x09090b, 0.04);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 22);
    camera.lookAt(0, 0, -2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    // Spotlight acting as a street lantern / investigation light
    const spotLight = new THREE.SpotLight(0xef4444, 2, 40, Math.PI / 4, 0.5, 1);
    spotLight.position.set(0, 15, 0);
    scene.add(spotLight);

    // --- CREATE 3D ENVIRONMENT WORLD ---
    // Dark Asphalt Floor
    const groundGeo = new THREE.PlaneGeometry(60, 60);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x18181b, roughness: 0.8 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Grid lines for hacker/cyber map visual feel
    const grid = new THREE.GridHelper(60, 30, 0x3f3f46, 0x27272a);
    grid.position.y = 0.01;
    scene.add(grid);

    // Storage array for interactable assets
    const clickTargets = [];

    function createSceneObject(geometry, material, x, z, name, labelText, colorHex) {
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(x, geometry.parameters.height / 2, z);
        mesh.name = name;
        scene.add(mesh);
        clickTargets.push(mesh);

        // Add a small glowing floating indicator beacon above each interactive object
        const beaconGeo = new THREE.TorusGeometry(0.4, 0.1, 8, 24);
        const beaconMat = new THREE.MeshBasicMaterial({ color: colorHex });
        const beacon = new THREE.Mesh(beaconGeo, beaconMat);
        beacon.position.set(x, geometry.parameters.height + 1.2, z);
        beacon.rotation.x = Math.PI / 2;
        beacon.name = name + "_beacon";
        scene.add(beacon);
        
        return mesh;
    }

    // 1. Pokémon Store (Neon Blue Building)
    const storeMat = new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.4 });
    createSceneObject(new THREE.BoxGeometry(6, 5, 6), storeMat, -8, -5, "store", "POKÉMON STORE", 0x3b82f6);

    // 2. The Disguised White Construction Van (White Long Box)
    const vanMat = new THREE.MeshStandardMaterial({ color: 0xf4f4f5, roughness: 0.5 });
    createSceneObject(new THREE.BoxGeometry(3, 2.5, 6), vanMat, 4, 4, "van", "WHITE VAN", 0xffffff);

    // 3. Gas Station (Green / Yellow Building)
    const gasMat = new THREE.MeshStandardMaterial({ color: 0x15803d, roughness: 0.5 });
    createSceneObject(new THREE.BoxGeometry(7, 4, 5), gasMat, 10, -8, "gas_station", "GAS STATION", 0x22c55e);

    // 4. Street Corner / Witness Area (Dark Column placeholder)
    const cornerMat = new THREE.MeshStandardMaterial({ color: 0x4b5563 });
    createSceneObject(new THREE.BoxGeometry(2, 3, 2), cornerMat, -6, 8, "corner", "WITNESS CORNER", 0xa1a1aa);


    // --- GAME TEXT DATA DATABASE ---
    const gameData = {
        main: {
            text: "<strong>CASE BRIEFING:</strong> On June 23, 2026, at 17:38, 11-year-old Gregory Mottingham was kidnapped right outside a UK Pokémon store after purchasing a rare £300 card. A suspect lured him into a vehicle under false pretenses. Click the 3D world elements to evaluate data logs, cross-examine details, and find the culprit.",
            options: [{ text: "Open Accusation Terminal", action: "goAccuse" }]
        },
        store: {
            text: "<strong>[LOCATION: THE POKÉMON STORE]</strong><br>CCTV Timeline Summary:<br>• 17:28 - Gregory walks in.<br>• 17:33 - Gregory handles buying the card. Simultaneously, suspect <strong>Alexander Foed Hungary</strong> arrives.<br>• 17:36 - Gregory leaves out the front doors. Alexander trails right behind him tracking him down.",
            options: [{ text: "Question Shopkeeper", action: "goShopkeeper" }, { text: "Back to Map Overview", action: "goMain" }]
        },
        shopkeeper: {
            text: "<strong>[WITNESS INTERROGATION: THE SHOPKEEPER]</strong><br>• <em>Motive Check:</em> Rumored to swap cards for profit margins.<br>• <em>Alibi Statement:</em> Confirms he stayed behind the terminal desk completely locked into a frantic voice phone call with his companion.<br>• <em>Forensics:</em> Digital phone records back up his status window accurately. He is cleared.",
            options: [{ text: "Inspect Store Exterior", action: "goStore" }]
        },
        van: {
            text: "<strong>[EVIDENCE VEHICLE: UNMARKED WHITE VAN]</strong><br>Found hidden down an access road disguised with a fake cardboard construction company magnetic tag. Inside, forensic tracking located a mask fabric matching descriptions. Gregory was intercepted directly at this vehicle site at 17:38 when a suspect promised a premium card transaction for €50.",
            options: [{ text: "Back to Map Overview", action: "goMain" }]
        },
        gas_station: {
            text: "<strong>[LOCATION: THE NEARBY GAS STATION]</strong><br>This is the primary location utilized by suspect <strong>Alexander Foed Hungary</strong> for his alibi statement. He claims he was inside the facility's locked bathroom stalls during the exact minutes the kidnapping took place down the block.",
            options: [{ text: "Check Bathroom CCTV Logs", action: "goCCTV" }, { text: "Back to Map Overview", action: "goMain" }]
        },
        cctv: {
            text: "<strong>[DIGITAL EVIDENCE: GAS STATION CCTV]</strong><br>CRITICAL DISCOVERY: Video tracks Alexander entering the single corridor bathroom access path before 17:38. However, *he never returns past the front cameras*. Investigation shows a rear emergency fire escape window was left unbolted. His alibi is completely broken!",
            options: [{ text: "Back to Gas Station", action: "goGas" }]
        },
        corner: {
            text: "<strong>[LOCATION: STREET WITNESS CORNER]</strong><br>Two individuals were located tracking events from this junction during the 17:30 hour window.",
            options: [{ text: "Interview Rodrigo Martini", action: "goRodrigo" }, { text: "Interview Homeless Man", action: "goHomeless" }, { text: "Back to Map Overview", action: "goMain" }]
        },
        rodrigo: {
            text: "<strong>[SUSPECT PROFILE: RODRIGO MARTINI]</strong><br>• <em>Motive:</em> Was marketing lemonade nearby to stack funding for Robux vouchers. Ducked inside the card shop checking for gaming inventory.<br>• <em>Alibi:</em> Main traffic CCTV confirms he exited at the matching timeframe as Gregory, but kept walking completely away from the vehicle vector with empty hands.",
            options: [{ text: "Check Other Witness Corner profiles", action: "goCorner" }]
        },
        homeless: {
            text: "<strong>[SUSPECT PROFILE: THE HOMELESS MAN]</strong><br>• <em>Motive:</em> Highly alert of street valuations, could sell high-end cargo to get back on his feet.<br>• <em>Alibi:</em> Stated he watched from his corner. Street peripheral cameras confirm he remained fixed to his spot on the concrete grid line, leaving him physically impossible to lock the van doors.",
            options: [{ text: "Check Other Witness Corner profiles", action: "goCorner" }]
        },
        accuse: {
            text: "<strong>🚨 SYSTEM RESOLUTION WARNING: SELECT THE PRIMARY CULPRIT</strong><br>Choose who orchestrated the event to secure the card assets:",
            options: [
                { text: "Alexander Foed Hungary", action: "win" },
                { text: "Rodrigo Martini", action: "lose" },
                { text: "The Shopkeeper", action: "lose" },
                { text: "The Homeless Man", action: "lose" }
            ]
        }
    };

    // --- UI NAVIGATION ENGINE ---
    function updatePanel(sceneKey) {
        const data = gameData[sceneKey];
        let html = `<p>${data.text}</p><div class="btn-grid">`;
        
        data.options.forEach(opt => {
            html += `<button class="btn" onclick="handleUiAction('${opt.action}')">${opt.text}</button>`;
        });
        
        html += `</div>`;
        document.getElementById('info-panel').innerHTML = html;
    }

    function handleUiAction(action) {
        if (action === "goMain") updatePanel("main");
        else if (action === "goStore") updatePanel("store");
        else if (action === "goShopkeeper") updatePanel("shopkeeper");
        else if (action === "goGas") updatePanel("gas_station");
        else if (action === "goCCTV") updatePanel("cctv");
        else if (action === "goCorner") updatePanel("corner");
        else if (action === "goRodrigo") updatePanel("rodrigo");
        else if (action === "goHomeless") updatePanel("homeless");
        else if (action === "goAccuse") updatePanel("accuse");
        else if (action === "win") {
            document.getElementById('info-panel').innerHTML = `
                <h2 class="success">CASE SOLVED SUMMARY 🟢</h2>
                <p>"Our detective has solved the case..." <strong>Alexander Foed Hungary is guilty!</strong> Faced with your evidence matching the broken bathroom window timeline loop, he confessed. Driven by pure jealousy to beat his peer in a Pokémon confrontation showdown, he stole the card and deployed the construction disguise vehicle. Excellent work!</p>
                <button class="btn" onclick="handleUiAction('goMain')">Restart Terminal Map</button>
            `;
        } else if (action === "lose") {
            document.getElementById('info-panel').innerHTML = `
                <h2 class="fail">CRITICAL ARREST FAILURE 🔴</h2>
                <p>Alibi held valid under cross-examination context. The target is clear of actions. The accurate offender managed to shift transport assets across state limits with the card pack.</p>
                <button class="btn" onclick="handleUiAction('goAccuse')">Return to Accusation Interface</button>
            `;
        }
    }

    // --- RAYCASTING (DETECTING CLICKS ON 3D OBJECTS) ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (event) => {
        // Evaluate normalize device layout coordinates for mouse pointer
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(clickTargets);

        if (intersects.length > 0) {
            const hitName = intersects[0].object.name;
            if (hitName === "store") updatePanel("store");
            if (hitName === "van") updatePanel("van");
            if (hitName === "gas_station") updatePanel("gas_station");
            if (hitName === "corner") updatePanel("corner");
        }
    });

    // --- ANIMATION DISPLAY LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Slowly spin the floating indicator rings over targets
        scene.children.forEach(child => {
            if (child.name && child.name.includes("_beacon")) {
                child.rotation.z += 0.02;
            }
        });

        renderer.render(scene, camera);
    }

    // Adjust perspective calculation mapping if layout dimensions scale
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Run engine on start loop
    animate();
    updatePanel("main");

</script>
</body>
</html>
